<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ödeme</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ececec, #d6d6d6);
  text-align: center;
}

/* HEADER */
.header { padding: 20px; }
.header img { width: 150px; }

/* KART */
.card {
  position: relative;
  background: white;
  width: 90%;
  max-width: 400px;
  margin: 20px auto;
  padding: 25px 20px;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
}

/* KURDELE */
.ribbon {
  position: absolute;
  top: 15px;
  right: -60px;
  background: #d32f2f;
  color: white;
  padding: 8px 60px;
  transform: rotate(45deg);
  font-size: 12px;
  font-weight: bold;
}

/* QR */
.qr img {
  width: 160px;
  margin-bottom: 15px;
}

/* LABEL */
.label {
  font-size: 13px;
  color: #777;
  margin: 10px 0 5px;
  text-align: left;
}

/* INFO */
.info {
  background: #f7f7f7;
  padding: 12px;
  border-radius: 12px;
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 8px;
}

/* BUTTON */
.button {
  background: linear-gradient(45deg, #d32f2f, #ff5252);
  color: white;
  border: none;
  padding: 13px;
  width: 100%;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;
  margin-top: 10px;
}

/* SUCCESS */
.success {
  display: none;
  font-size: 60px;
  color: green;
  margin-top: 15px;
  animation: pop 0.4s ease;
}

@keyframes pop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png">
</div>

<div class="card">

<div class="ribbon">HAVALE</div>

<!-- ✅ QR EKLENDİ -->
<div class="qr">
  <img src="qr.png">
</div>

<div class="label">Alıcı Adı</div>
<div id="alici" class="info">
  ÖZELLER DAYANIKLI TÜKETİM MALLARI LTD. ŞTİ.
</div>

<div class="label">IBAN</div>
<div id="iban" class="info">
  TR49 0001 0023 2941 8015 6450 02
</div>

<div class="label">Açıklama</div>
<div class="info">
  [Ad Soyad]
</div>

<div class="label">!!! ÖNEMLİ !!!</div>
<div class="info" style="font-weight:900;">
  Ürünü alan kişinin adı soyadı yazılmalıdır!
</div>

<button class="button" onclick="copyIBAN()">IBAN Kopyala</button>
<button class="button" onclick="copyAlici()">Alıcı Adı Kopyala</button>

<!-- 🔥 BANKA SEÇİM -->
<button class="button" onclick="openBank('ziraat')">Ziraat</button>
<button class="button" onclick="openBank('garanti')">Garanti</button>
<button class="button" onclick="openBank('isbank')">İş Bankası</button>

<!-- 💸 ÖDEME TAMAMLANDI -->
<button class="button" onclick="paid()">Ödeme Yaptım</button>

<div id="success" class="success">✔</div>

</div>

<script>
function copyIBAN() {
  navigator.clipboard.writeText(document.getElementById("iban").innerText);
  alert("IBAN kopyalandı");
}

function copyAlici() {
  navigator.clipboard.writeText(document.getElementById("alici").innerText);
  alert("Alıcı adı kopyalandı");
}

/* BANKA AÇ */
function openBank(bank){
  if(bank==="ziraat"){
    window.location.href="https://play.google.com/store/apps/details?id=com.ziraat.ziraatmobil";
  }
  if(bank==="garanti"){
    window.location.href="https://play.google.com/store/apps/details?id=com.garanti.cepsube";
  }
  if(bank==="isbank"){
    window.location.href="https://play.google.com/store/apps/details?id=com.pozitron.iscep";
  }
}

/* ÖDENDİ */
function paid(){
  document.getElementById("success").style.display="block";
}
</script>

</body>
</html>
