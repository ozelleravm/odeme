<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ödeme</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* STORY BOYUTU (9:16) */
.story {
  width: 360px;
  height: 640px;
  background: #000; /* SİYAH YAPILDI */
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  background: #ffffff; /* SİYAH */
  padding: 15px;
  text-align: center;
}

.header img {
  width: 140px;
}

/* İÇERİK */
.content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  background: #ffffff; /* SİYAH */
}

/* BAŞLIK */
.title img {
  width: 100%;
  max-width: 220px;
  display: block;
  margin: 0 auto 15px;
}

/* LABEL */
.label {
  font-size: 13px;
  color: #ff0000; /* BEYAZ */
  margin: 12px 0 5px;
}

/* BİLGİ */
.info {
  background: #ffffff; /* KOYU SİYAH */
  color: #000000;
  padding: 12px;
  border-radius: 10px;
  font-weight: bold;
  font-size: 14px;
  word-break: break-word;
  box-shadow: 0 2px 10px rgb(0, 0, 0);
}

/* UYARI */
.warning {
  background: #ff0000;
  color: #ffffff;
  padding: 12px;
  border-radius: 10px;
  font-size: 13px;
  margin-top: 15px;
  font-weight: bold;
  text-align: center;
}

</style>
</head>

<body>

<div class="story">

  <div class="header">
    <img src="özeller logo.png" alt="Logo">
  </div>

  <div class="content">

    <div class="title">
      <img src="Ziraat_Bankası_logo.svg.png" alt="">
    </div>

    <div class="label">Alıcı adı</div>
    <div class="info">
      ÖZELLER DAYANIKLI TÜKETİM MALLARI LTD. ŞTİ.
    </div>

    <div class="label">Iban</div>
    <div class="info">
      TR 49 0001 0023 2941 8015 6450 02
    </div>

    <div class="label">Açıklama</div>
    <div class="info">
      [Ad Soyad]
    </div>

    <div class="warning">
      !!!ÜCRETİ GÖNDEREN KİŞİNİN ADI SOYADI YAZILMASI GEREKMEKTEDİR!!!
    </div>

  </div>

</div>

</body>
</html>
